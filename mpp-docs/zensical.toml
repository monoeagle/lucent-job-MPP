# ══════════════════════════════════════════════════════════════════════════════
# zensical.toml – MPP Dokumentation
# ══════════════════════════════════════════════════════════════════════════════

[project]
site_name        = "MPP — Marketplace Portal"
site_description = "IT-Service Marketplace Portal · Flask + React · TDD · v1.1.0"
site_author      = "Lucent Trails"
copyright        = "Copyright &copy; 2026 Lucent Trails"

docs_dir = "docs"
site_dir = "site"

extra_css = ["stylesheets/extra.css"]
extra_javascript = [
  { path = "javascripts/mermaid.min.js", defer = true },
  "javascripts/mermaid-init.js",
  "javascripts/palette-init.js",
  "javascripts/lightbox.js",
  "javascripts/activity-heatmap.js",   # Heatmap + Insights auf der Startseite
  "javascripts/icon-rail.js",          # linkes Icon-Menü statt Material-Tabs
  "javascripts/hub-stop.js",
]

nav = [
  { "Überblick" = "index.md" },
  { "Grundlagen" = [
    { "Projektüberblick" = "grundlagen/ueberblick.md" },
    { "Installation"    = "grundlagen/installation.md" },
    { "Schnellstart"    = "grundlagen/schnellstart.md" },
    { "Architektur"     = "grundlagen/architektur.md" },
  ]},
  { "Referenz" = [
    { "Oberflächen"     = "referenz/oberflaeche.md" },
    { "Datenmodell"     = "referenz/datenmodell.md" },
    { "API-Referenz"    = "referenz/api-referenz.md" },
    { "Services"        = "referenz/services.md" },
    { "Frontend"        = "referenz/frontend.md" },
  ]},
  { "Entwicklung" = [
    { "Projektstruktur" = "entwicklung/projektstruktur.md" },
    { "Conventions"     = "entwicklung/conventions.md" },
    { "Testing"         = "entwicklung/testing.md" },
    { "Credentials"     = "entwicklung/credentials.md" },
    { "Arbeitspakete"   = "entwicklung/arbeitspakete.md" },
    { "Changelog"       = "entwicklung/changelog.md" },
  ]},
  { "Betrieb" = [
    { "Stubs & Mocks"     = "betrieb/stubs-mocks.md" },
    { "Troubleshooting"   = "betrieb/troubleshooting.md" },
  ]},
  { "Erkenntnisse" = "erkenntnisse/index.md" },   # generiert: Mirror aus docs/insights + docs/handoffs
]

[project.theme]
language = "de"
features = [
  # navigation.tabs/.tabs.sticky entfernt — die Icon-Rail (icon-rail.js) ersetzt die Tab-Leiste
  "navigation.sections",
  "navigation.top",
  "search.highlight",
  "content.code.copy",
]

[[project.theme.palette]]
media   = "(prefers-color-scheme: light)"
scheme  = "default"
primary = "custom"
accent  = "custom"
toggle.icon = "material/weather-night"
toggle.name = "Dunkelmodus aktivieren"

[[project.theme.palette]]
media   = "(prefers-color-scheme: dark)"
scheme  = "slate"
primary = "custom"
accent  = "custom"
toggle.icon = "material/weather-sunny"
toggle.name = "Hellmodus aktivieren"
